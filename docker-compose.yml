version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sanar-postgres
    environment:
      POSTGRES_DB: sanar_pay
      POSTGRES_USER: sanar
      POSTGRES_PASSWORD: sanar123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sanar-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sanar -d sanar_pay']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sanar-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - sanar-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sanar-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: sanar
      RABBITMQ_DEFAULT_PASS: sanar123
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - sanar-network
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  sanar-network:
    driver: bridge
